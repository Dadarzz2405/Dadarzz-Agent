<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="a" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="50%" stop-color="#7c5cfc"/>
      <stop offset="100%" stop-color="#5c3ce8"/>
    </linearGradient>
    <linearGradient id="b" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d4aa" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7c5cfc" stop-opacity="0.3"/>
    </linearGradient>
    <radialGradient id="c" cx="50%" cy="45%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7c5cfc" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ambient glow -->
  <circle cx="32" cy="32" r="28" fill="url(#c)"/>

  <!-- Outer hexagonal frame -->
  <polygon points="32,4 56,18 56,46 32,60 8,46 8,18" stroke="url(#a)" stroke-width="0.7" fill="none" opacity="0.25"/>
  <polygon points="32,8 52,20 52,44 32,56 12,44 12,20" stroke="url(#a)" stroke-width="0.4" fill="none" opacity="0.12"/>

  <!-- Deep neural pathways — fine lines -->
  <g stroke="url(#b)" stroke-width="0.6" stroke-linecap="round" opacity="0.45">
    <!-- Left hemisphere arcs -->
    <path d="M20,20 Q14,32 20,44"/>
    <path d="M24,16 Q16,32 24,48"/>
    <!-- Right hemisphere arcs -->
    <path d="M44,20 Q50,32 44,44"/>
    <path d="M40,16 Q48,32 40,48"/>
    <!-- Cross-hemisphere bridges -->
    <path d="M20,24 C28,22 36,22 44,24"/>
    <path d="M18,32 C26,29 38,29 46,32"/>
    <path d="M18,38 C26,35 38,35 46,38"/>
    <path d="M20,44 C28,42 36,42 44,44"/>
    <!-- Vertical spine -->
    <line x1="32" y1="12" x2="32" y2="52"/>
  </g>

  <!-- Secondary neural threads -->
  <g stroke="#7c5cfc" stroke-width="0.35" stroke-linecap="round" opacity="0.3">
    <path d="M28,14 Q22,24 26,34"/>
    <path d="M36,14 Q42,24 38,34"/>
    <path d="M26,34 Q30,42 28,50"/>
    <path d="M38,34 Q34,42 36,50"/>
    <path d="M22,28 Q32,26 42,28"/>
    <path d="M22,40 Q32,38 42,40"/>
  </g>

  <!-- Neural nodes — layer 1 (input) -->
  <g opacity="0.9">
    <circle cx="32" cy="12" r="1.8" fill="url(#a)"/>
    <circle cx="24" cy="16" r="1.3" fill="#7c5cfc"/>
    <circle cx="40" cy="16" r="1.3" fill="#7c5cfc"/>
  </g>

  <!-- Neural nodes — layer 2 (hidden) -->
  <g opacity="0.85">
    <circle cx="20" cy="24" r="1.5" fill="#7c5cfc"/>
    <circle cx="32" cy="22" r="1.2" fill="#a78bfa"/>
    <circle cx="44" cy="24" r="1.5" fill="#7c5cfc"/>
  </g>

  <!-- Neural nodes — layer 3 (core processing) -->
  <g opacity="1">
    <circle cx="18" cy="32" r="1.6" fill="url(#a)"/>
    <circle cx="32" cy="32" r="3" fill="url(#a)"/>
    <circle cx="32" cy="32" r="1.2" fill="#00d4aa" opacity="0.8"/>
    <circle cx="46" cy="32" r="1.6" fill="url(#a)"/>
  </g>

  <!-- Neural nodes — layer 4 (hidden) -->
  <g opacity="0.85">
    <circle cx="20" cy="40" r="1.4" fill="#7c5cfc"/>
    <circle cx="32" cy="38" r="1.2" fill="#a78bfa"/>
    <circle cx="44" cy="40" r="1.4" fill="#7c5cfc"/>
  </g>

  <!-- Neural nodes — layer 5 (output) -->
  <g opacity="0.9">
    <circle cx="24" cy="48" r="1.3" fill="#7c5cfc"/>
    <circle cx="32" cy="52" r="1.8" fill="url(#a)"/>
    <circle cx="40" cy="48" r="1.3" fill="#7c5cfc"/>
  </g>

  <!-- Center core pulse -->
  <circle cx="32" cy="32" r="5.5" stroke="#7c5cfc" stroke-width="0.4" fill="none" opacity="0.2"/>
  <circle cx="32" cy="32" r="8" stroke="#a78bfa" stroke-width="0.3" fill="none" opacity="0.1"/>

  <!-- Accent data-flow dots -->
  <g fill="#00d4aa" opacity="0.6">
    <circle cx="26" cy="28" r="0.7"/>
    <circle cx="38" cy="28" r="0.7"/>
    <circle cx="26" cy="36" r="0.7"/>
    <circle cx="38" cy="36" r="0.7"/>
    <circle cx="32" cy="26" r="0.5"/>
    <circle cx="32" cy="42" r="0.5"/>
  </g>
</svg>

name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag name (e.g. v1.0.0)'
        required: true
        default: 'v0.0.0-test'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS ARM64 (M1/M2)
          - os: macos-latest
            platform: macos-arm64
            artifact_name: DadarzzAgent-macOS-arm64

          # Windows x64
          - os: windows-latest
            platform: windows-x64
            artifact_name: DadarzzAgent-Windows-x64

          # Linux x64
          - os: ubuntu-latest
            platform: linux-x64
            artifact_name: DadarzzAgent-Linux-x64

          # Linux ARM64
          - os: ubuntu-24.04-arm
            platform: linux-arm64
            artifact_name: DadarzzAgent-Linux-arm64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Ensure config directory exists
        run: mkdir -p config
        shell: bash

      - name: Build with PyInstaller (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          pyinstaller --noconfirm --onedir --name DadarzzAgent --add-data "templates:templates" --add-data "static:static" --add-data "config:config" --hidden-import groq --hidden-import flask --hidden-import dotenv --hidden-import pypdf --hidden-import jinja2.ext --hidden-import markupsafe main.py

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller --noconfirm --onedir --name DadarzzAgent --add-data "templates;templates" --add-data "static;static" --add-data "config;config" --hidden-import groq --hidden-import flask --hidden-import dotenv --hidden-import pypdf --hidden-import jinja2.ext --hidden-import markupsafe main.py

      - name: Create macOS launcher
        if: runner.os == 'macOS'
        shell: bash
        run: |
          printf '#!/bin/bash\nDIR="$(cd "$(dirname "$0")" && pwd)"\ncd "$DIR"\necho ""\necho "Dadarzz Agent is running..."\necho "Close this window to stop."\necho ""\n./DadarzzAgent\n' > dist/DadarzzAgent/launch.command
          chmod +x dist/DadarzzAgent/launch.command

      - name: Create Linux launcher
        if: runner.os == 'Linux'
        shell: bash
        run: |
          printf '#!/bin/bash\nDIR="$(cd "$(dirname "$0")" && pwd)"\ncd "$DIR"\necho ""\necho "Dadarzz Agent is running..."\necho "Close this window to stop."\necho ""\n./DadarzzAgent\n' > dist/DadarzzAgent/launch.sh
          chmod +x dist/DadarzzAgent/launch.sh

      - name: Create Windows launcher
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $content = "@echo off`r`ntitle Dadarzz Agent`r`ncd /d `"%~dp0`"`r`necho.`r`necho Dadarzz Agent is running...`r`necho Close this window to stop.`r`necho.`r`nDadarzzAgent.exe`r`npause`r`n"
          [System.IO.File]::WriteAllText("dist/DadarzzAgent/launch.bat", $content)

      - name: Add README
        shell: bash
        run: |
          printf 'Dadarzz Agent - Quick Start\n\nmacOS:   double-click launch.command\nWindows: double-click launch.bat\nLinux:   run ./launch.sh\n\nIf blocked on macOS: right-click > Open > Open\nor run: xattr -cr DadarzzAgent/\n\nNeed a Groq API key?\nhttps://console.groq.com/keys (free)\n' > dist/DadarzzAgent/README.txt

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd dist
          zip -r "${{ matrix.artifact_name }}.zip" DadarzzAgent/

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/DadarzzAgent" -DestinationPath "dist/${{ matrix.artifact_name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine tag name
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Dadarzz Agent ${{ steps.tag.outputs.tag }}"
          body: |
            ## Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | 🍎 macOS | Apple Silicon (M1/M2) | `DadarzzAgent-macOS-arm64.zip` |
            | 🪟 Windows | x64 | `DadarzzAgent-Windows-x64.zip` |
            | 🐧 Linux | x64 | `DadarzzAgent-Linux-x64.zip` |
            | 🐧 Linux | ARM64 | `DadarzzAgent-Linux-arm64.zip` |

            ## Quick Start
            1. Download the ZIP for your platform
            2. Unzip the file
            3. Run the launcher:
               - **macOS**: double-click `launch.command` (right-click → Open if blocked)
               - **Windows**: double-click `launch.bat`
               - **Linux**: run `./launch.sh`
            4. Get a free API key at https://console.groq.com/keys

          files: |
            artifacts/**/*.zip
          draft: false
          prerelease: false
